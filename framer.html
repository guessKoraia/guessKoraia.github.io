<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 가공 도구</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
body { font-family: "Pretendard", sans-serif; }
textarea::-webkit-scrollbar { width: 8px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen py-12 relative overflow-x-hidden">

<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-blue-400/20 blur-[100px] rounded-full pointer-events-none"></div>

<div class="max-w-[1200px] mx-auto px-6 relative z-10">
  <div class="mb-12 text-center">
    <div class="inline-flex items-center justify-center px-3 py-1 mb-4 text-xs font-semibold text-blue-600 bg-blue-100 rounded-full">
      Workspace Tool
    </div>
    <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-500 tracking-tight mb-4">
      HTML 가공 도구
    </h1>
    <p class="text-slate-500 font-medium">외부 코드를 안전하게 정제하고 최적화된 파일로 내보내세요.</p>
  </div>
  
  <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white p-8 md:p-10">
    
    <div class="mb-8 flex items-center justify-between bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-center gap-3">
        <input type="checkbox" id="use-original" checked class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer">
        <label for="use-original" class="text-sm font-bold text-slate-800 cursor-pointer select-none">원본 설정값 적용하기 (체크 시 하단 설정값이 무시되고 원본 HTML 데이터를 유지합니다)</label>
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-bold text-slate-700 mb-4">사이트 이름 (Site Name)</label>
      
      <div class="bg-slate-100 rounded-t-2xl px-4 pt-4 flex items-end border-b border-slate-200 overflow-hidden">
        <div class="flex items-center gap-2 mb-3 mr-4">
          <div class="w-3 h-3 rounded-full bg-red-400"></div>
          <div class="w-3 h-3 rounded-full bg-amber-400"></div>
          <div class="w-3 h-3 rounded-full bg-green-400"></div>
        </div>
        <div class="bg-white px-4 py-2 rounded-t-xl flex items-center gap-3 w-64 shadow-sm border border-b-0 border-slate-200 relative translate-y-[1px]">
          <div id="tab-favicon-container" class="w-4 h-4 bg-gradient-to-tr from-blue-500 to-cyan-400 rounded-sm shrink-0 flex items-center justify-center overflow-hidden">
            <svg id="tab-favicon-default" class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
            <img id="tab-favicon-img" class="w-full h-full object-cover hidden" alt="favicon">
          </div>
          <span id="tab-preview-text" class="text-sm text-slate-400 truncate font-medium select-none">원본 설정값 적용중</span>
          <svg class="w-4 h-4 text-slate-400 ml-auto shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>
      </div>
      
      <input type="text" id="site-name" disabled class="w-full px-5 py-4 bg-white border border-slate-200 rounded-b-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-700 font-medium placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="예: 테스트2 | 한국인공지능협회">
    </div>

    <div class="mb-10 p-6 bg-slate-50/50 rounded-2xl border border-slate-200/70">
      <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        검색엔진 최적화 (SEO / GEO) <span class="text-xs font-normal text-slate-500 ml-1">선택사항</span>
      </h3>
      <div class="space-y-4">
        <div class="flex flex-col sm:flex-row gap-4">
          <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-600 mb-1">대표 웹사이트 주소 (Canonical URL)</label>
            <input type="url" id="site-canonical" disabled class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm text-slate-700 placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="https://example.com">
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-600 mb-1">대표 키워드를 쉼표(, )로 구분해서 3~5개 작성해 주세요. (Keywords)</label>
            <input type="text" id="site-keywords" value="한국인공지능협회, " disabled class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm text-slate-700 placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="키워드1, 키워드2...">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">사이트에 대해 설명해 주세요.</label>
          <input type="text" id="site-description" disabled class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm text-slate-700 placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="예: 세상을 바꾸는 혁신적인 AI 솔루션">
        </div>
        <div class="flex flex-col sm:flex-row gap-4">
          <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-600 mb-1">파비콘 이미지 URL을 입력해 주세요. (Favicon)</label>
            <input type="url" id="site-favicon" disabled class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm text-slate-700 placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="https://example.com/favicon.png">
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-slate-600 mb-1">SNS 공유용 썸네일 이미지 URL을 입력해 주세요. (OG Image)</label>
            <input type="url" id="site-og-image" disabled class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm text-slate-700 placeholder:text-slate-400 disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed" placeholder="https://example.com/og-image.jpg">
          </div>
        </div>
      </div>
    </div>

    <div class="mb-10">
      <label class="block text-sm font-bold text-slate-700 mb-4">원본 HTML 코드</label>
      <div class="relative group">
        <textarea id="raw-html" class="w-full h-80 px-5 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all font-mono text-sm leading-relaxed text-slate-600 resize-y" placeholder="여기에 가공할 HTML 코드를 붙여넣으세요..."></textarea>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 pt-2">
      <button id="btn-preview" class="flex-1 px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl transition-all duration-200 flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
        결과 미리보기
      </button>
      <button id="btn-export" class="flex-1 px-6 py-4 bg-slate-900 hover:bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-slate-900/20 hover:shadow-blue-600/30 transition-all duration-200 flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        HTML 내보내기
      </button>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md transition-opacity" id="modal-backdrop"></div>
  <div class="absolute inset-4 md:inset-10 bg-white rounded-[2rem] shadow-2xl flex flex-col overflow-hidden border border-slate-200/50 scale-100 transition-transform">
    <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white/80 backdrop-blur-sm z-10">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
        </div>
        <h2 class="text-xl font-bold text-slate-800">미리보기</h2>
      </div>
      <button id="btn-close-modal" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 hover:text-slate-900 rounded-xl transition-colors">닫기</button>
    </div>
    <div class="flex-1 bg-slate-50 relative">
      <iframe id="preview-frame" class="w-full h-full border-0 absolute inset-0"></iframe>
    </div>
  </div>
</div>

<script>
const useOriginalCheckbox = document.getElementById('use-original');
const inputs = [
  document.getElementById('site-name'),
  document.getElementById('site-canonical'),
  document.getElementById('site-keywords'),
  document.getElementById('site-description'),
  document.getElementById('site-favicon'),
  document.getElementById('site-og-image')
];
const tabPreviewText = document.getElementById('tab-preview-text');
const tabFaviconDefault = document.getElementById('tab-favicon-default');
const tabFaviconImg = document.getElementById('tab-favicon-img');
const tabFaviconContainer = document.getElementById('tab-favicon-container');

function updateUI() {
  const isChecked = useOriginalCheckbox.checked;
  inputs.forEach(input => {
    input.disabled = isChecked;
  });

  if (isChecked) {
    tabPreviewText.textContent = '원본 설정값 적용중';
    tabPreviewText.classList.add('text-slate-400');
    tabPreviewText.classList.remove('text-slate-700');
    tabFaviconImg.classList.add('hidden');
    tabFaviconDefault.classList.add('hidden');
    tabFaviconContainer.classList.add('bg-gradient-to-tr', 'from-blue-500', 'to-cyan-400');
    tabFaviconContainer.classList.remove('bg-transparent');
  } else {
    const nameVal = inputs[0].value.trim();
    tabPreviewText.textContent = nameVal || '이곳에 표시됩니다';
    if (nameVal) {
      tabPreviewText.classList.remove('text-slate-400');
      tabPreviewText.classList.add('text-slate-700');
    } else {
      tabPreviewText.classList.remove('text-slate-700');
      tabPreviewText.classList.add('text-slate-400');
    }
    
    const favVal = inputs[4].value.trim();
    if (favVal) {
      tabFaviconImg.src = favVal;
      tabFaviconImg.classList.remove('hidden');
      tabFaviconDefault.classList.add('hidden');
      tabFaviconContainer.classList.remove('bg-gradient-to-tr', 'from-blue-500', 'to-cyan-400');
      tabFaviconContainer.classList.add('bg-transparent');
    } else {
      tabFaviconImg.src = '';
      tabFaviconImg.classList.add('hidden');
      tabFaviconDefault.classList.remove('hidden');
      tabFaviconContainer.classList.add('bg-gradient-to-tr', 'from-blue-500', 'to-cyan-400');
      tabFaviconContainer.classList.remove('bg-transparent');
    }
  }
}

useOriginalCheckbox.addEventListener('change', updateUI);
inputs.forEach(input => input.addEventListener('input', updateUI));
tabFaviconImg.addEventListener('error', () => {
  tabFaviconImg.classList.add('hidden');
  tabFaviconDefault.classList.remove('hidden');
  tabFaviconContainer.classList.add('bg-gradient-to-tr', 'from-blue-500', 'to-cyan-400');
  tabFaviconContainer.classList.remove('bg-transparent');
});

function processHtml() {
  const rawHtml = document.getElementById('raw-html').value;
  if (!rawHtml) {
    alert('HTML 코드를 입력해주세요.');
    return null;
  }

  let headContent = '';
  const titleSplitMatch = rawHtml.match(/<\/title>\s*([\s\S]*?)<\/head>/i);
  if (titleSplitMatch) {
    headContent = titleSplitMatch[1];
  } else {
    const headOnlyMatch = rawHtml.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
    if (headOnlyMatch) headContent = headOnlyMatch[1];
  }

  const oT = ((rawHtml.match(/<title[^>]*>([\s\S]*?)<\/title>/i) || [])[1] || '').trim();
  const oC = ((rawHtml.match(/<link[^>]*rel=["']canonical["'][^>]*href=["']([^"']+)["']/i) || [])[1] || '').trim();
  const oK = ((rawHtml.match(/<meta[^>]*name=["']keywords["'][^>]*content=["']([^"']*)["']/i) || [])[1] || '').trim();
  const oD = ((rawHtml.match(/<meta[^>]*name=["']description["'][^>]*content=["']([^"']*)["']/i) || rawHtml.match(/<meta[^>]*property=["']og:description["'][^>]*content=["']([^"']*)["']/i) || [])[1] || '').trim();
  const oF = ((rawHtml.match(/<link[^>]*rel=["'](?:shortcut )?icon["'][^>]*href=["']([^"']+)["']/i) || rawHtml.match(/<link[^>]*rel=["']apple-touch-icon["'][^>]*href=["']([^"']+)["']/i) || [])[1] || '').trim();
  const oO = ((rawHtml.match(/<meta[^>]*property=["']og:image["'][^>]*content=["']([^"']*)["']/i) || [])[1] || '').trim();

  const chk = document.getElementById('use-original').checked;
  const fT = chk ? oT : (document.getElementById('site-name').value.trim() || oT);
  const fC = chk ? oC : (document.getElementById('site-canonical').value.trim() || oC);
  const fK = chk ? oK : (document.getElementById('site-keywords').value.trim() || oK);
  const fD = chk ? oD : (document.getElementById('site-description').value.trim() || oD);
  const fF = chk ? oF : (document.getElementById('site-favicon').value.trim() || oF);
  const fO = chk ? oO : (document.getElementById('site-og-image').value.trim() || oO);

  headContent = headContent.replace(/<title[^>]*>[\s\S]*?<\/title>/gi, '');
  const mr = ['og:title', 'twitter:title', 'title', 'description', 'og:description', 'twitter:description', 'og:image', 'twitter:image', 'og:type', 'twitter:card', 'og:site_name', 'og:url', 'author', 'keywords'];
  const mp = mr.join('|');
  const ms = new RegExp(`<meta[^>]*(?:name|property)\\s*=\\s*["'](?:${mp})["'][^>]*>`, 'gi');
  headContent = headContent.replace(ms, '');
  const ls = /<link[^>]*rel\s*=\s*["'][^"']*(?:icon|apple-touch-icon|canonical)[^"']*["'][^>]*>/gi;
  headContent = headContent.replace(ls, '');
  headContent = headContent.replace(/<script[^>]*type=["']application\/ld\+json["'][^>]*>[\s\S]*?<\/script>/gi, '');

  let bodyContent = rawHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i)?.[1] || '';

  function rm(s, id) {
    let idx = s.indexOf('id="' + id + '"');
    if (idx === -1) idx = s.indexOf("id='" + id + "'");
    if (idx === -1) return s;
    const start = s.lastIndexOf('<div', idx);
    if (start === -1) return s;
    let o = 0;
    let i = start;
    while (i < s.length) {
      if (s.substr(i, 4).toLowerCase() === '<div') {
        o++;
        i += 4;
      } else if (s.substr(i, 5).toLowerCase() === '</div') {
        o--;
        if (o === 0) {
          const e = s.indexOf('>', i) + 1;
          return s.slice(0, start) + s.slice(e);
        }
        i += 5;
      } else {
        i++;
      }
    }
    return s;
  }

  bodyContent = rm(bodyContent, '__framer-badge-container');
  bodyContent = rm(bodyContent, '__framer-editorbar-container');

  let st = `\n  <meta name="author" content="한국인공지능협회">`;
  const rK = fK ? fK : '한국인공지능협회';
  st += `\n  <meta name="keywords" content="${rK}">`;

  if (fT) st += `\n  <meta property="og:title" content="${fT}">\n  <meta property="og:site_name" content="${fT}">\n  <meta name="twitter:title" content="${fT}">\n  <meta property="og:type" content="website">`;
  if (fC) st += `\n  <link rel="canonical" href="${fC}">\n  <meta property="og:url" content="${fC}">`;
  if (fD) st += `\n  <meta name="description" content="${fD}">\n  <meta property="og:description" content="${fD}">\n  <meta name="twitter:description" content="${fD}">`;
  if (fF) st += `\n  <link rel="icon" href="${fF}">\n  <link rel="apple-touch-icon" href="${fF}">`;
  if (fO) st += `\n  <meta property="og:image" content="${fO}">\n  <meta name="twitter:image" content="${fO}">\n  <meta name="twitter:card" content="summary_large_image">`;

  const ld = {
    "@context": "https://schema.org",
    "@type": "NGO",
    "name": "한국인공지능협회",
    "logo": "https://raw.githubusercontent.com/koraiadev/img/04c57e6691ee81cf1336d87a5d45178f3137691b/koraia/logo-koraia.svg",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+82-2-713-4800",
      "email": "info@koraia.org",
      "contactType": "customer service"
    },
    "sameAs": [
      "https://www.facebook.com/koraiaorg",
      "https://www.instagram.com/koraia_org",
      "https://x.com/koraia_official",
      "https://www.linkedin.com/in/koraia",
      "https://www.youtube.com/channel/UClmlU0giEZJauHuiA0Yf2yw"
    ]
  };
  if (fC) ld.url = fC;

  st += `\n  <script type="application/ld+json">\n${JSON.stringify(ld, null, 4)}\n  <${'/'}script>`;

  const ss = fT ? fT.replace(/"/g, '\\"') : '';
  let sl = '';
  if (ss) {
    sl = `\n  <script>
    (function() {
      var t = "${ss}";
      if (!t) return;
      document.title = t;
      window.addEventListener('DOMContentLoaded', function() {
        document.title = t;
        var o = new MutationObserver(function() {
          if (document.title !== t) document.title = t;
        });
        var e = document.querySelector('title');
        if (e) o.observe(e, { childList: true, characterData: true, subtree: true });
        o.observe(document.head, { childList: true, subtree: true });
      });
    })();
  <${'/'}script>\n`;
  }

  const loadingCss = `\n  <style>
    #__framer-badge-container, #__framer-editorbar-container { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    #loading-screen { position: fixed; inset: 0; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2147483647; transition: opacity 0.3s ease; color: #333; font-family: sans-serif; }
    #loading-screen .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) { #loading-screen { background-color: #0f172a; color: #f3f4f6; } #loading-screen .spinner { border-color: #334155; border-top-color: #3b82f6; } }
  </style>`;

  headContent = st + headContent + loadingCss + sl;

  const SCRIPT_START = '<' + 'script>';
  const SCRIPT_END = '<' + '/script>';
  const BODY_END = '<' + '/body>';
  const HTML_END = '<' + '/html>';

  return `<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="generator" content="Framer 904da2c">
  <title>${fT}</title>${headContent}
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>로딩 중...</p>
  </div>
  ${SCRIPT_START}
    document.addEventListener('DOMContentLoaded', function () {
      let r = false;
      let t = false;
      setTimeout(function () {
        t = true;
        if (r) h();
      }, 1000);
      window.addEventListener('load', function () {
        setTimeout(function () {
          r = true;
          if (t) h();
        }, 500);
      });
      function h() {
        const l = document.getElementById('loading-screen');
        if (l) {
          l.style.opacity = '0';
          setTimeout(function () {
            l.style.display = 'none';
          }, 300);
        }
      }
    });
  ${SCRIPT_END}
${bodyContent}
${BODY_END}
${HTML_END}`;
}

document.getElementById('btn-preview').addEventListener('click', () => {
  const finalHtml = processHtml();
  if (!finalHtml) return;
  const modal = document.getElementById('modal');
  const iframe = document.getElementById('preview-frame');
  iframe.srcdoc = finalHtml;
  modal.classList.remove('hidden');
});

const closeModal = () => {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('preview-frame').srcdoc = '';
};

document.getElementById('btn-close-modal').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', closeModal);

document.getElementById('btn-export').addEventListener('click', () => {
  const finalHtml = processHtml();
  if (!finalHtml) return;
  const blob = new Blob([finalHtml], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
