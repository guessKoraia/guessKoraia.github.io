        function renderStatsView(items, getCat) {
            // 연도별 통계
            const byYear = {};
            const byCat = {};
            items.forEach(it => {
                const y = String(it.date).slice(0, 4);
                const c = getCat(it) || '기타';
                byYear[y] = (byYear[y] || 0) + 1;
                byCat[c] = (byCat[c] || 0) + 1;
            });

            const years = Object.keys(byYear).sort();
            const maxYearCount = Math.max(...Object.values(byYear));
            const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
            const maxCatCount = Math.max(...Object.values(byCat));

            // 최근 이벤트
            const recentItems = items.slice(0, 5);

            return `
                <div class="agi-stats">
                    <div class="stats-overview">
                        <div class="stat-box">
                            <div class="stat-number">${items.length}</div>
                            <div class="stat-label">총 이벤트</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${years.length}</div>
                            <div class="stat-label">기록 연도</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${Object.keys(byCat).length}</div>
                            <div class="stat-label">카테고리</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${items[0]?.date?.slice(0,4) || '-'}</div>
                            <div class="stat-label">최신 연도</div>
                        </div>
                    </div>

                    <div class="stats-charts">
                        <div class="chart-section">
                            <h4 class="chart-title">📅 연도별 이벤트 수</h4>
                            <div class="bar-chart">
                                ${years.map(y => `
                                    <div class="bar-row">
                                        <span class="bar-label">${y}</span>
                                        <div class="bar-container">
                                            <div class="bar" style="width: ${(byYear[y] / maxYearCount) * 100}%"></div>
                                            <span class="bar-value">${byYear[y]}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="chart-section">
                            <h4 class="chart-title">🏷️ 카테고리별 분포</h4>
                            <div class="bar-chart horizontal">
                                ${cats.map(([c, cnt]) => `
                                    <div class="bar-row">
                                        <span class="bar-label">${c}</span>
                                        <div class="bar-container">
                                            <div class="bar cat-bar" style="width: ${(cnt / maxCatCount) * 100}%"></div>
                                            <span class="bar-value">${cnt}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="stats-recent">
                        <h4 class="chart-title">🕐 최근 주요 이벤트</h4>
                        <div class="recent-list">
                            ${recentItems.map((it, i) => `
                                <a class="recent-item" href="${it.link}" target="_blank" rel="noopener noreferrer">
                                    <span class="recent-rank">${i + 1}</span>
                                    <div class="recent-content">
                                        <span class="recent-date">${it.date}</span>
                                        <span class="recent-title">${it.title}</span>
                                    </div>
                                    <span class="entry-badge">${getCat(it) || '-'}</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function insertAgiStyles() {
            const styleId = 'agi-timeline-centered';
            if (document.getElementById(styleId)) return;
            
            const style = document.createElement('style');
            style.id = styleId;
            style.textContent = `
                :root { --border: #e5e7eb; --card-bg: #fff; --muted: #6b7280; }
                body.dark :root { --border: #374151; --card-bg: #1f2937; --muted: #9ca3af; }

                /* Controls */
                .agi-controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
                .agi-view-switcher { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
                .agi-view-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
                .agi-view-btn:hover { border-color: #2563eb; color: #2563eb; }
                .agi-view-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
                .agi-view-btn svg { stroke: currentColor; }
                .agi-filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
                .agi-filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
                .agi-filter-btn:hover { border-color: #2563eb; color: #2563eb; }
                .agi-filter-btn.selected { background: #2563eb; color: #fff; border-color: #2563eb; }

                /* Timeline View */
                .timeline-center { position: relative; padding: 10px 0 10px; }
                .timeline-line { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: var(--border); transform: translateX(-50%); z-index: 0; }
                .timeline-year { position: relative; display: flex; justify-content: center; margin: 36px 0 12px; }
                .year-badge { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-weight: 800; font-size: 18px; letter-spacing: .02em; }
                .timeline-entry { position: relative; display: block; width: 50%; padding: 8px 18px; text-decoration: none; color: inherit; z-index: 1; box-sizing: border-box; }
                .timeline-entry.left { left: 0; padding-right: 50px; }
                .timeline-entry.right { left: 50%; padding-left: 50px; }
                .timeline-entry .dot { position: absolute; top: 24px; width: 10px; height: 10px; background: #2563eb; border: 2px solid #fff; border-radius: 50%; transform: translateY(-50%); z-index: 2; }
                .timeline-entry.left .dot { right: -6px; }
                .timeline-entry.right .dot { left: -6px; }
                .timeline-entry .month-label { position: absolute; top: 24px; transform: translateY(-50%); font-size: 12px; color: var(--muted); background: var(--card-bg); padding: 2px 6px; border: 1px solid var(--border); border-radius: 999px; z-index: 1; }
                .timeline-entry.left .month-label { right: -56px; }
                .timeline-entry.right .month-label { left: -56px; }
                .entry-card { border: 1px solid var(--border); border-radius: 6px; display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; transition: box-shadow .15s, border-color .15s; }
                .timeline-entry.left .entry-card { margin-right: 18px; }
                .timeline-entry.right .entry-card { margin-left: 18px; }
                .entry-card:hover { border-color: #9ca3af; box-shadow: 0 6px 16px rgba(0,0,0,.06); }
                .entry-thumb { width: 120px; height: 84px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: #f3f4f6; }
                .entry-thumb .og-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
                .entry-body { display: flex; flex-direction: column; gap: 6px; }
                .entry-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
                .entry-badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); background: #f8fafc; font-weight: 600; color: #374151; white-space: nowrap; }
                body.dark .entry-badge { background: #111827; color: #e5e7eb; }
                .entry-date, .entry-source { font-size: 12px; color: var(--muted); }
                .entry-source { display: inline-flex; align-items: center; gap: 6px; }
                .entry-source .fav { width: 14px; height: 14px; border-radius: 3px; }
                .entry-title { margin: 0; font-size: .98rem; line-height: 1.45; font-weight: 700; }
                .entry-desc { margin: 0; color: #4b5563; font-size: .92rem; }
                body.dark .entry-desc { color: #d1d5db; }
                .entry-additional { margin: 6px 0 0; color: #6b7280; font-size: .88rem; }
                body.dark .entry-additional { color: #9ca3af; }

                /* Grid View */
                .agi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 10px 0; }
                .agi-grid-card { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; text-decoration: none; color: inherit; background: var(--card-bg); transition: all .2s; }
                .agi-grid-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.08); border-color: #2563eb; }
                .grid-thumb { width: 100%; height: 140px; overflow: hidden; background: #f3f4f6; }
                .grid-thumb .og-thumb { width: 100%; height: 100%; object-fit: cover; }
                .grid-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
                .grid-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
                .grid-title { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
                .grid-desc { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }
                .grid-source { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-top: auto; }
                .grid-source .fav { width: 14px; height: 14px; border-radius: 2px; }

                /* Table View */
                .agi-table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
                .agi-table { width: 100%; border-collapse: collapse; font-size: 14px; }
                .agi-table th { background: #f8fafc; padding: 12px 14px; text-align: left; font-weight: 600; color: #374151; border-bottom: 2px solid var(--border); white-space: nowrap; }
                body.dark .agi-table th { background: #1f2937; color: #e5e7eb; }
                .agi-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
                .agi-table tr:hover { background: rgba(37, 99, 235, 0.04); }
                .table-date { font-size: 13px; color: var(--muted); white-space: nowrap; }
                .table-badge { font-size: 10px !important; padding: 2px 6px !important; }
                .table-title { display: flex; flex-direction: column; gap: 4px; }
                .table-title strong { font-size: 14px; color: inherit; }
                .table-desc { font-size: 12px; color: var(--muted); }
                .table-source { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
                .table-source .fav { width: 14px; height: 14px; border-radius: 2px; }

                /* Stats View */
                .agi-stats { display: flex; flex-direction: column; gap: 24px; padding: 10px 0; }
                .stats-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
                .stat-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
                .stat-number { font-size: 32px; font-weight: 800; color: #2563eb; }
                .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
                .stats-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
                .chart-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
                .chart-title { margin: 0 0 16px; font-size: 15px; font-weight: 700; }
                .bar-chart { display: flex; flex-direction: column; gap: 8px; }
                .bar-row { display: flex; align-items: center; gap: 10px; }
                .bar-label { width: 80px; font-size: 12px; font-weight: 600; text-align: right; flex-shrink: 0; }
                .bar-container { flex: 1; display: flex; align-items: center; gap: 8px; }
                .bar { height: 24px; background: linear-gradient(90deg, #3b82f6, #2563eb); border-radius: 4px; min-width: 4px; transition: width .3s; }
                .cat-bar { background: linear-gradient(90deg, #8b5cf6, #6366f1); }
                .bar-value { font-size: 12px; font-weight: 600; color: var(--muted); }
                .stats-recent { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
                .recent-list { display: flex; flex-direction: column; gap: 10px; }
                .recent-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: inherit; transition: all .2s; }
                .recent-item:hover { background: rgba(37, 99, 235, 0.04); border-color: #2563eb; }
                .recent-rank { width: 28px; height: 28px; background: #2563eb; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
                .recent-content { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
                .recent-date { font-size: 12px; color: var(--muted); }
                .recent-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

                /* Footer */
                .agi-footer { max-width: 920px; margin: 18px auto 6px; padding: 0 12px; box-sizing: border-box; }
                .agi-source { text-align: center; margin-bottom: 10px; font-size: 12px; color: #6b7280; }
                .agi-source a { color: inherit; text-decoration: underline; }
                body.dark .agi-source { color: #9ca3af; }
                .agi-previous-card { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-light); box-shadow: 0 6px 18px rgba(16,24,40,0.04); }
                body.dark .agi-previous-card { background: var(--card-dark); }
                .agi-previous-card .prev-left { display: flex; flex-direction: column; gap: 6px; }
                .prev-title { font-weight: 800; font-size: 14px; color: #111827; }
                body.dark .prev-title { color: #e5e7eb; }
                .prev-desc { font-size: 13px; color: #6b7280; }
                body.dark .prev-desc { color: #9ca3af; }
                .prev-btn { display: inline-block; background: #2563eb; color: #fff; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: 700; border: 1px solid rgba(37,99,235,0.12); }
                .prev-btn:hover { background: #1f6fe0; }

                @media (max-width: 768px) {
                    .stats-overview { grid-template-columns: repeat(2, 1fr); }
                    .stats-charts { grid-template-columns: 1fr; }
                    .bar-label { width: 60px; font-size: 11px; }
                    .timeline-line { left: 16px; }
                    .timeline-entry, .timeline-entry.right, .timeline-entry.left { width: 100%; left: 0; padding-left: 48px; padding-right: 18px; }
                    .timeline-entry .dot { left: 11px; right: auto; }
                    .timeline-entry .month-label,
                    .timeline-entry.left .month-label,
                    .timeline-entry.right .month-label { left: 26px; right: auto; transform: translateY(-50%); font-size: 11px; }
                    .entry-card { grid-template-columns: 1fr; }
                    .agi-previous-card { flex-direction: column; align-items: stretch; text-align: left; }
                    .prev-btn { width: 100%; text-align: center; }
                }

                @media (max-width: 480px) {
                    .stats-overview { grid-template-columns: 1fr 1fr; gap: 10px; }
                    .stat-box { padding: 14px; }
                    .stat-number { font-size: 24px; }
                    .agi-grid { grid-template-columns: 1fr; }
                    .agi-view-btn span { display: none; }
                    .agi-view-btn { padding: 10px; }
                }
            `;
            document.head.appendChild(style);
        }
    </script>

</body>
