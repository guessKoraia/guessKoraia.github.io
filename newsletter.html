<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 뉴스레터</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="description" content="한국인공지능협회 인공지능 소식 모음 | 인공지능 관련 최신 정보를 확인하세요.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="인공지능 소식 모음 | 한국인공지능협회">
    <meta property="og:description" content="인공지능 관련 최신 정보를 확인하세요.">
    <meta name="twitter:title" content="인공지능 소식 모음 | 한국인공지능협회">
    <meta name="twitter:description" content="인공지능 관련 최신 정보를 확인하세요.">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image"
        content="https://raw.githubusercontent.com/guessKoraia/guessKoraia.github.io/refs/heads/main/koraia_main_popup/report_4.png">
    <meta name="twitter:image"
        content="https://raw.githubusercontent.com/guessKoraia/guessKoraia.github.io/refs/heads/main/koraia_main_popup/report_4.png">
    <link href="https://framerusercontent.com/images/yHL6S80IssKYxSTQMOG4ilm6ck.png" rel="icon"
        media="(prefers-color-scheme: light)">
    <link href="https://framerusercontent.com/images/yHL6S80IssKYxSTQMOG4ilm6ck.png" rel="icon"
        media="(prefers-color-scheme: dark)">

    <style>
        :root {
            --bg-light: #f8fafc;
            --bg-dark: #0b1220;
            --text-light: #0f172a;
            --text-dark: #e5e7eb;
            --card-light: #ffffff;
            --card-dark: #111827;
            --primary: #2563eb; /* 비즈니스 블루 */
            --border-color-dark: #374151;
        }

        html {
            font-size: 18px;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", sans-serif;
            margin: 0;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background-color .3s, color .3s;
            line-height: 1.6;
            letter-spacing: .02em;
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        header {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, .7);
            border-bottom: 1px solid #e5e7eb;
            padding: 2rem 1rem .8rem;
            transition: background-color .3s;
        }

        body.dark header {
            background: rgba(17, 24, 39, .7);
            border-color: var(--border-color-dark);
        }

        .header-container {
            max-width: 1100px;
            min-height: 40px;
            margin: auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }

        .title img {
            height: 30px;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: .45rem;
            z-index: 1000;
            align-items: center;
        }

        .btn {
            padding: .4rem .8rem;
            border-radius: .6rem;
            font-size: .9rem;
            border: 1px solid #d1d5db;
            cursor: pointer;
            background: var(--card-light);
            color: var(--text-light);
            transition: transform .2s, background .3s, color .3s, border-color .3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        body.dark .btn {
            border: none;
            background: var(--card-dark);
            color: var(--text-dark);
            border: 1px solid var(--border-color-dark);
        }

        body.dark .btn:hover {
            background: var(--border-color-dark);
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: .8rem;
            line-height: 1;
            border-radius: 50%;
        }

        .icon-btn svg {
            stroke: var(--text-light);
            transition: stroke .3s;
        }

        body.dark .icon-btn svg {
            stroke: var(--text-dark);
        }

        nav {
            max-width: 1100px;
            margin: auto;
            display: flex;
            justify-content: center;
            gap: .5rem;
            padding-top: .8rem;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-btn {
            padding: .5rem 1rem;
            border-radius: 1rem;
            font-size: .8rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            color: #262626;
            background: transparent;
            border: 1px solid #eee;
            transition: transform .2s, background .3s;
        }

        .nav-btn:hover {
            background: #eff0f3;
            transform: translateY(-2px);
        }

        .nav-btn.selected {
            background: var(--primary);
            color: #fff;
        }

        body.dark .nav-btn {
            color: #93c5fd;
            border: 1px solid var(--border-color-dark);
        }

        body.dark .nav-btn:hover {
            background: #1e3a8a;
        }

        body.dark .nav-btn.selected {
            background: #1d4ed8;
            color: #fff;
        }

        .summary-section {
            max-width: 1100px;
            margin: auto;
            padding: 2rem 1rem;
            padding-bottom: 0;
        }

        /* 핵심 요약 리디자인 */
        .summary-card { border: 1px solid var(--border); border-radius: 8px; background: var(--card-light); padding: 1rem; box-shadow: 0 2px 10px rgba(0,0,0,.03); }
        body.dark .summary-card { background: var(--card-dark); }
        .summary-head { display:flex; align-items:center; justify-content: space-between; margin-bottom: .4rem; }
        .summary-badge { display:inline-block; border: 1px solid var(--border); background: rgba(37,99,235,.06); color: #2563eb; font-weight: 800; font-size: .85rem; padding: 4px 10px; border-radius: 999px; letter-spacing: .02em; }
        .summary-body p { margin: .45rem 0; line-height: 1.7; color: #374151; }
        body.dark .summary-body p { color: #d1d5db; }

        /* AGI filter bar */
        .agi-filter-bar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin: 8px 0 14px; }
        .agi-filter-btn { border: 1px solid var(--border); background: transparent; color: inherit; padding: 6px 10px; border-radius: 999px; cursor: pointer; font-weight: 700; }
        .agi-filter-btn.selected { background: #2563eb; color: #fff; border-color: #2563eb; }
        .agi-filter-btn:hover { filter:brightness(.98); }
        body.dark .summary-card { background: var(--card-dark); }
        .summary-head { display:flex; align-items:center; justify-content: space-between; margin-bottom: .4rem; }
        .summary-badge { display:inline-block; border: 1px solid var(--border); background: rgba(37,99,235,.06); color: #2563eb; font-weight: 800; font-size: .85rem; padding: 4px 10px; border-radius: 999px; letter-spacing: .02em; }
        .summary-body p { margin: .45rem 0; line-height: 1.7; color: #374151; }
        body.dark .summary-body p { color: #d1d5db; }

        .card-section {
            max-width: 1100px;
            margin: auto;
            padding: 2rem 1rem 4rem 1rem;
        }

        .category-block {
            margin-bottom: 2rem;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            color: var(--primary);
        }

        .category-cards {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }

        @media (min-width:640px) {
            .category-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width:1024px) {
            .category-cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background: var(--card-light);
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
            transition: transform .2s, box-shadow .2s;
        }

        body.dark .card {
            background: var(--card-dark);
            border: 1px solid var(--border-color-dark);
        }

        /* 카테고리별 카드 색상 - 접근성 개선 버전 */
        .card.domestic {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-color: #f3e8ff;
        }

        .card.global {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            border-color: #e0e7ff;
        }

        .card.government {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            border-color: #dcfce7;
        }

        .card.corporate {
            background: #fdf2f8;
            border-left: 4px solid #ec4899;
            border-color: #fce7f3;
        }

        .card.legal {
            background: #f3f4f6;
            border-left: 4px solid #6b7280;
            border-color: #e5e7eb;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }

        .card.legal:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
            background: #e5e7eb;
        }

        body.dark .card.domestic {
            background: #1c1917;
            border-left: 4px solid #f59e0b;
            border-color: #292524;
        }

        body.dark .card.global {
            background: #1e293b;
            border-left: 4px solid #3b82f6;
            border-color: #334155;
        }

        body.dark .card.government {
            background: #14532d;
            border-left: 4px solid #10b981;
            border-color: #166534;
        }

        body.dark .card.corporate {
            background: #831843;
            border-left: 4px solid #ec4899;
            border-color: #9d174d;
        }

        body.dark .card.legal {
            background: #374151;
            border-left: 4px solid #9ca3af;
            border-color: #4b5563;
        }

        body.dark .card.legal:hover {
            background: #4b5563;
        }

        .card.legal .report-date {
            margin: 0 0 .5rem;
            font-size: .8rem;
            font-weight: 600;
            color: #9ca3af;
        }

        body.dark .card.legal .report-date {
            color: #9ca3af;
        }



        .card h2 {
            font-size: 1rem;
            font-weight: bold;
            margin: .8rem 0 .5rem;
            color: var(--text-light);
        }

        body.dark .card h2 {
            color: var(--text-dark);
        }

        /* 카테고리별 제목 색상 */
        .card.domestic h2 {
            color: #92400e;
        }

        .card.global h2 {
            color: #1d4ed8;
        }

        .card.government h2 {
            color: #047857;
        }

        .card.corporate h2 {
            color: #be185d;
        }

        .card.legal h2 {
            color: #374151;
        }

        body.dark .card.domestic h2,
        body.dark .card.global h2,
        body.dark .card.government h2,
        body.dark .card.corporate h2,
        body.dark .card.legal h2 {
            color: var(--text-dark);
        }

        .card p {
            font-size: .90rem;
            line-height: 1.6;
            color: #4b5563;
            margin: .6rem 0;
        }

        .card p:first-of-type {
            margin-top: 0;
        }

        .card p:last-of-type {
            margin-bottom: 0;
        }

        body.dark .card p {
            color: #d1d5db;
        }

        /* 카테고리별 텍스트 색상 조정 */
        .card.domestic p {
            color: #78350f;
        }

        .card.global p {
            color: #1e40af;
        }

        .card.government p {
            color: #065f46;
        }

        .card.corporate p {
            color: #be185d;
        }

        .card.legal p {
            color: #4b5563;
        }

        body.dark .card.domestic p,
        body.dark .card.global p,
        body.dark .card.government p,
        body.dark .card.corporate p,
        body.dark .card.legal p {
            color: #d1d5db;
        }

        .error {
            color: #d81d1d;
            background: #ffe8e8;
            padding: .5rem;
            border-radius: 6px;
        }

        @media (max-width:639px) {
            header {
                padding-top: 1.5rem;
            }

            .header-container {
                gap: .8rem;
            }

            .nav-btn {
                padding: .3rem 1rem;
            }
        }

        /* Footer 스타일 */
        footer {
            border-top: 1px solid #e5e7eb;
            background: rgba(255, 255, 255, .7);
            backdrop-filter: blur(12px);
            padding: 2rem 1rem;
            margin-top: 2rem;
            transition: background-color .3s;
        }

        body.dark footer {
            background: rgba(17, 24, 39, .7);
            border-color: var(--border-color-dark);
        }

        .footer-container {
            max-width: 1100px;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .date-navigation {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .date-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary);
            min-width: 150px;
            text-align: center;
        }

        .nav-date-btn {
            padding: .6rem 1.2rem;
            border-radius: .8rem;
            font-size: .9rem;
            font-weight: 500;
            border: 1px solid #d1d5db;
            cursor: pointer;
            background: var(--card-light);
            color: var(--text-light);
            transition: transform .2s, background .3s, color .3s;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .nav-date-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: var(--primary);
            color: white;
        }

        .nav-date-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        body.dark .nav-date-btn {
            background: var(--card-dark);
            color: var(--text-dark);
            border: 1px solid var(--border-color-dark);
        }

        body.dark .nav-date-btn:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .footer-info {
            text-align: center;
            color: #6b7280;
            font-size: .85rem;
            line-height: 1.6;
        }

        body.dark .footer-info {
            color: #9ca3af;
        }

        @media (max-width:639px) {
            .date-navigation {
                gap: .5rem;
            }

            .nav-date-btn {
                padding: .5rem 1rem;
                font-size: .85rem;
            }

            .date-display {
                font-size: 1rem;
                min-width: 120px;
            }
        }

        /* 하단 카테고리 네비게이션 */
        .bottom-category-nav {
            max-width: 1100px;
            margin: 3rem auto 2rem;
            padding: 0 1rem;
            text-align: center;
        }

        .bottom-category-nav h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
            margin: 0 0 1.5rem;
        }

        body.dark .bottom-category-nav h3 {
            color: var(--text-dark);
        }

        .bottom-nav-buttons {
            display: flex;
            justify-content: center;
            gap: .8rem;
            flex-wrap: wrap;
        }

        .bottom-nav-btn {
            padding: .7rem 1.5rem;
            border-radius: 1rem;
            font-size: .9rem;
            font-weight: 500;
            border: 1px solid #d1d5db;
            cursor: pointer;
            background: var(--card-light);
            color: var(--text-light);
            transition: transform .2s, background .3s, color .3s;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }

        .bottom-nav-btn:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        body.dark .bottom-nav-btn {
            background: var(--card-dark);
            color: var(--text-dark);
            border: 1px solid var(--border-color-dark);
        }

        body.dark .bottom-nav-btn:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }

        /* 모바일 화면 (화면 너비 768px 이하일 때 적용) */
        @media screen and (max-width: 768px) {
          .timeline-entry.left .entry-card {
            margin-right: 0 !important;  /* 기존 오른쪽 여백 제거 */
            margin-left: 18px !important; /* 새로운 왼쪽 여백 적용 */
          }
        }

        @media (max-width:639px) {
            .bottom-category-nav {
                margin: 2rem auto 1.5rem;
            }

            .bottom-category-nav h3 {
                font-size: 1rem;
                margin-bottom: 1rem;
            }

            .bottom-nav-buttons {
                gap: .5rem;
            }

            .bottom-nav-btn {
                padding: .6rem 1.2rem;
                font-size: .85rem;
            }
        }

        /* iframe 모달 스타일 */
        .iframe-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .9);
            z-index: 9999;
            animation: fadeIn .3s ease;
        }

        .iframe-modal.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .iframe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, .95);
            color: white;
        }

        .iframe-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }

        .iframe-close-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: .5rem 1.5rem;
            border-radius: .5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background .2s, color .2s;
        }

        .iframe-close-btn:hover {
            background: white;
            color: black;
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: calc(100% - 70px);
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 639px) {
            .iframe-header {
                padding: .8rem 1rem;
            }

            .iframe-title {
                font-size: 1rem;
            }

            .iframe-close-btn {
                padding: .4rem 1rem;
                font-size: .9rem;
            }
        }
        /* (삭제) 고정 인디케이터 스타일 사용 안 함 */
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <div class="title">
                <img src="https://raw.githubusercontent.com/koraiadev/img/bac6e32c862f2d6c9b25e022fe1123fdad7fb29f/koraia/logo-koraia.svg"
                    alt="KORAIA">
                <h1>오늘의 AI 뉴스레터</h1>
            </div>
        </div>
        <nav>
            <button class="nav-btn selected" data-cat="all">📜AI 정보</button>
            <button class="nav-btn" data-cat="interview">📣인터뷰·기고문</button>
            <button class="nav-btn" data-cat="agi">🧠AGI 타임라인</button>
            <button class="nav-btn" data-cat="legal">⚖️AI 특화 법률 리포트</button>
        </nav>
    </header>

    <main>
        <div class="summary-section">
            <p><a href="https://report.koraia.org/#news" style="
    text-decoration: none;
    color: gray;
">해당 뉴스 바로가기</a></p>
            <article class="summary-card">
                <div class="summary-head">
                    <span class="summary-badge">핵심 요약</span>
                </div>
                <div class="summary-body" id="summary">요약을 불러오는 중입니다.</div>
            </article>
        </div>

        <div id="cardSection" class="card-section"></div>

        <!-- 하단 카테고리 네비게이션 -->
        <div id="bottomCategoryNav" class="bottom-category-nav" style="display: none;">
            <h3>📌 다른 소식도 볼까요?</h3>
            <div class="bottom-nav-buttons">
                <button class="bottom-nav-btn" data-cat="all">📜 전체보기</button>
                <button class="bottom-nav-btn" data-cat="domestic">🏠 국내동향</button>
                <button class="bottom-nav-btn" data-cat="global">✈️ 해외동향</button>
                <button class="bottom-nav-btn" data-cat="government">🏛️ 정부동향</button>
                <button class="bottom-nav-btn" data-cat="corporate">🏢 기업동향</button>
                <button class="bottom-nav-btn" data-cat="interview">📣 인터뷰·기고문</button>
                <button class="bottom-nav-btn" data-cat="agi">🧠 AGI 타임라인</button>
            </div>
        </div>

        <div class="controls">
            <button id="darkToggle" class="btn icon-btn" aria-label="다크 모드 전환">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        const fetchOgImage = async (url) => {
            try {
                const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=true`);
                const json = await res.json();
                const img = json?.data?.image?.url || json?.data?.logo?.url;
                return img || null;
            } catch (e) {
                return null;
            }
        };

        const getHostname = (url) => {
            try { return new URL(url).hostname.replace(/^www\./,''); } catch { return ''; }
        };

        let currentInterviewFilter = 'all'; // all, interview, oped

        const renderInterviewTimeline = async () => {
            // 요약 숨김, 하단 네비 숨김
            const summarySection = document.querySelector(".summary-section");
            summarySection.style.display = "none";
            bottomCategoryNav.style.display = "none";

            renderInterviewView();
        };

        function renderInterviewView() {
            // 최신순 정렬
            const allItems = [...interviewOpedItems].sort((a, b) => (a.date < b.date ? 1 : -1));
            
            // 필터링
            const filtered = currentInterviewFilter === 'all' 
                ? allItems 
                : allItems.filter(it => it.type === currentInterviewFilter);
            
            // 연도별 그룹화
            const byYear = filtered.reduce((acc, it) => {
                const y = (it.date || '').slice(0, 4);
                (acc[y] = acc[y] || []).push(it);
                return acc;
            }, {});

            // 타입별 카운트
            const interviewCount = allItems.filter(it => it.type === 'interview').length;
            const opedCount = allItems.filter(it => it.type === 'oped').length;

            // 컨트롤 바
            const controlsHtml = `
                <section class="category-block">
                    <h3 class="category-title">📣 인터뷰 · 기고문</h3>
                    <div class="interview-controls">
                        <div class="interview-view-switcher">

                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                                타임라인
                            </button>
                            <button class="interview-view-btn ${currentInterviewView === 'grid' ? 'active' : ''}" data-view="grid">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                                그리드
                            </button>
                            <button class="interview-view-btn ${currentInterviewView === 'table' ? 'active' : ''}" data-view="table">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                                테이블
                            </button>
                            <button class="interview-view-btn ${currentInterviewView === 'stats' ? 'active' : ''}" data-view="stats">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="14" width="4" height="6"/><rect x="10" y="10" width="4" height="10"/><rect x="16" y="6" width="4" height="14"/></svg>
                                통계
                            </button>
                        </div>
                        <div class="interview-filter-bar">
                            <button class="interview-filter-btn ${currentInterviewFilter === 'all' ? 'selected' : ''}" data-type="all">전체 (${allItems.length})</button>
                            <button class="interview-filter-btn ${currentInterviewFilter === 'interview' ? 'selected' : ''}" data-type="interview">📣 인터뷰 (${interviewCount})</button>
                            <button class="interview-filter-btn ${currentInterviewFilter === 'oped' ? 'selected' : ''}" data-type="oped">🖊️ 기고/정책 (${opedCount})</button>
                        </div>
                    </div>
                </section>
            `;

            let viewHtml = '';
            if (currentInterviewView === 'timeline') {
                viewHtml = renderInterviewTimelineView(byYear);
            } else if (currentInterviewView === 'grid') {
                viewHtml = renderInterviewGridView(filtered);
            } else if (currentInterviewView === 'table') {
                viewHtml = renderInterviewTableView(filtered);

                viewHtml = renderInterviewStatsView(allItems);

            setupLazyLoadingForImages(cardSectionEl);

        function renderInterviewTimelineView(byYear) {
            return `
                <div class="timeline-center">

                            <a class="timeline-entry ${idx % 2 === 0 ? 'left' : 'right'}" href="${it.url}" target="_blank" rel="noopener noreferrer">

                                    <div class="entry-thumb">

        function renderInterviewGridView(items) {

                                </tr>

                        </tbody>

        function renderInterviewStatsView(items) {
            // 연도별 통계
            const byYear = {};
            const byType = { interview: 0, oped: 0 };
            const bySource = {};
            
            items.forEach(it => {
                const y = String(it.date).slice(0, 4);
                byYear[y] = (byYear[y] || 0) + 1;
                byType[it.type] = (byType[it.type] || 0) + 1;
                const host = getHostname(it.url);
                if (host) bySource[host] = (bySource[host] || 0) + 1;
            });

            const years = Object.keys(byYear).sort();
            const maxYearCount = Math.max(...Object.values(byYear));
            const sources = Object.entries(bySource).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const maxSourceCount = sources.length > 0 ? sources[0][1] : 1;

            // 최근 아이템
            const recentItems = items.slice(0, 5);

            return `
                <div class="interview-stats">
                    <div class="stats-overview">
                        <div class="stat-box">
                            <div class="stat-number">${items.length}</div>
                            <div class="stat-label">총 게시물</div>
                        </div>
                        <div class="stat-box interview-stat">
                            <div class="stat-number">${byType.interview}</div>
                            <div class="stat-label">📣 인터뷰</div>
                        </div>
                        <div class="stat-box oped-stat">
                            <div class="stat-number">${byType.oped}</div>
                            <div class="stat-label">🖊️ 기고/정책</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${years.length}</div>
                            <div class="stat-label">활동 연도</div>
                        </div>
                    </div>

                    <div class="stats-charts">
                        <div class="chart-section">
                            <h4 class="chart-title">📅 연도별 활동</h4>
                            <div class="bar-chart">
                                ${years.map(y => `
                                    <div class="bar-row">
                                        <span class="bar-label">${y}</span>
                                        <div class="bar-container">
                                            <div class="bar interview-bar" style="width: ${(byYear[y] / maxYearCount) * 100}%"></div>
                                            <span class="bar-value">${byYear[y]}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="chart-section">
                            <h4 class="chart-title">📰 주요 매체</h4>
                            <div class="bar-chart">
                                ${sources.map(([src, cnt]) => `
                                    <div class="bar-row">
                                        <span class="bar-label source-label"><img class="fav" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(src)}&sz=16" alt=""/>${src.length > 12 ? src.slice(0, 12) + '...' : src}</span>
                                        <div class="bar-container">
                                            <div class="bar source-bar" style="width: ${(cnt / maxSourceCount) * 100}%"></div>
                                            <span class="bar-value">${cnt}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="stats-recent">
                        <h4 class="chart-title">🕐 최근 게시물</h4>
                        <div class="recent-list">
                            ${recentItems.map((it, i) => `
                                <a class="recent-item" href="${it.url}" target="_blank" rel="noopener noreferrer">
                                    <span class="recent-rank">${i + 1}</span>
                                    <div class="recent-content">
                                        <span class="recent-date">${it.date}</span>
                                        <span class="recent-title">${it.title}</span>
                                    </div>
                                    <span class="entry-badge ${it.type}">${getTypeBadge(it.type)}</span>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

                .chart-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
                .chart-title { margin: 0 0 16px; font-size: 15px; font-weight: 700; }
                .bar-chart { display: flex; flex-direction: column; gap: 8px; }
                .bar-row { display: flex; align-items: center; gap: 10px; }
                .bar-label { width: 50px; font-size: 12px; font-weight: 600; text-align: right; flex-shrink: 0; }
                .bar-label.source-label { width: 100px; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
                .bar-label .fav { width: 14px; height: 14px; border-radius: 2px; }
                .bar-container { flex: 1; display: flex; align-items: center; gap: 8px; }
                .bar { height: 24px; border-radius: 4px; min-width: 4px; transition: width .3s; }
                .bar.interview-bar { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
                .bar.source-bar { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
                .bar-value { font-size: 12px; font-weight: 600; color: var(--muted); }
                .stats-recent { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
                .recent-list { display: flex; flex-direction: column; gap: 10px; }

                .recent-item:hover { background: rgba(245, 158, 11, 0.04); border-color: #f59e0b; }
                .recent-rank { width: 28px; height: 28px; background: #f59e0b; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
                .recent-content { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
                .recent-date { font-size: 12px; color: var(--muted); }
                .recent-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

                @media (max-width: 768px) {
                    .stats-overview { grid-template-columns: repeat(2, 1fr); }
                    .stats-charts { grid-template-columns: 1fr; }
                    .bar-label { width: 40px; font-size: 11px; }
                    .bar-label.source-label { width: 80px; }
                    .timeline-line { left: 16px; }
                    .timeline-entry, .timeline-entry.right, .timeline-entry.left { width: 100%; left: 0; padding-left: 48px; padding-right: 18px; }
                    .timeline-entry .dot { left: 11px; right: auto; }
                    .timeline-entry .month-label,
                    .timeline-entry.left .month-label,
                    .timeline-entry.right .month-label { left: 26px; right: auto; transform: translateY(-50%); font-size: 11px; }
                    .entry-card { grid-template-columns: 1fr; }
                }

                @media (max-width: 480px) {
                    .stats-overview { grid-template-columns: 1fr 1fr; gap: 10px; }
                    .stat-box { padding: 14px; }
                    .stat-number { font-size: 24px; }
                    .interview-grid { grid-template-columns: 1fr; }
                    .interview-view-btn span { display: none; }
                    .interview-view-btn { padding: 10px; }
                }
            `;
            document.head.appendChild(style);
        }

        // iframe 모달 열기
        const openIframeModal = (url, title) => {
            const modal = document.getElementById('iframeModal');
            const iframe = document.getElementById('iframeContent');
            const modalTitle = document.getElementById('iframeModalTitle');

            modalTitle.textContent = title;
            iframe.src = url;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // 스크롤 방지
        };

        // iframe 모달 닫기
        const closeIframeModal = () => {
            const modal = document.getElementById('iframeModal');
            const iframe = document.getElementById('iframeContent');

            modal.classList.remove('active');
            iframe.src = ''; // iframe 초기화
            document.body.style.overflow = ''; // 스크롤 복원
        };

        // 닫기 버튼 이벤트
        document.getElementById('closeIframeBtn').addEventListener('click', closeIframeModal);

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('iframeModal');
                if (modal.classList.contains('active')) {
                    closeIframeModal();
                }
            }
        });

        // 모달 배경 클릭시 닫기
        document.getElementById('iframeModal').addEventListener('click', (e) => {
            if (e.target.id === 'iframeModal') {
                closeIframeModal();
            }
        });

        const updateBottomNav = (category) => {
            // 핵심 요약 섹션 표시/숨김
            const summarySectionEl = document.querySelector(".summary-section");
            if (category === "all") {
                // 전체보기일 때는 핵심 요약 표시, 하단 네비게이션 숨김
                summarySectionEl.style.display = "block";
                bottomCategoryNav.style.display = "none";
                return;
            }

            // legal 카테고리는 하단 네비게이션 숨김
            if (category === "legal" || category === "agi") {
                summarySectionEl.style.display = "none";
                bottomCategoryNav.style.display = "none";
                return;
            }

            // 특정 카테고리일 때는 핵심 요약 숨김, 하단 네비게이션 표시
            summarySectionEl.style.display = "none";
            bottomCategoryNav.style.display = "block";

            // 현재 선택된 카테고리를 제외한 나머지 버튼만 보이게
            bottomNavBtns.forEach(btn => {
                const btnCat = btn.dataset.cat;
                if (btnCat === category) {
                    btn.style.display = "none"; // 현재 카테고리 버튼은 숨김
                } else {
                    btn.style.display = "inline-flex"; // 나머지 버튼은 표시
                }
            });
        };

        const handleRenderInsights = (row, category = "all") => {
            function renderCards(insights, categoryType) {



                if (!insights) return '';
                return insights.map(insight => {
                    // =========================
                    // 제목/본문 파싱 (개선 버전)
                    // =========================
                    let title = null;
                    let content = insight;

                    // 0) 전처리: 트림 + 이모지(최신 범위) 제거
                    let cleanInsight = insight.trim()
                        .replace(/^(?:\p{Extended_Pictographic}[\uFE0F]?\s*)+/u, '');

                    // 1) 라인 전체가 **굵게** 블록들(+ 연결어)로만 구성된 경우 → 통째로 제목
                    //    예) **A** 와 **B**는 / **X**에서 **Y**로 / **M** 및 **N**
                    const boldOnlyLine = /^(?:\*\*[^*]+?\*\*)(?:\s*(?:[와과및]|에서|으로|로|,|\/|[-–—]|→|->)\s*(?:\*\*[^*]+?\*\*))*\s*(?:은|는|이다|:)?\s*$/u;

                    if (boldOnlyLine.test(cleanInsight)) {
                        title = cleanInsight.replace(/\*\*(.+?)\*\*/g, '$1').trim();
                        content = '';
                    } else {
                        // 2) 맨 앞 "**제목**:" 패턴
                        let match = cleanInsight.match(/^\*\*(.+?)\*\*:/);
                        if (match) {
                            title = match[1].trim();
                            content = cleanInsight.replace(match[0], '').trim();
                        } else {
                            // 3) 맨 앞 "**제목**" (콜론 없음)
                            match = cleanInsight.match(/^\*\*(.+?)\*\*\s*/);
                            if (match) {
                                title = match[1].trim();
                                content = cleanInsight.replace(match[0], '').trim();
                            } else {
                                // 4) 이모지 + "**제목**"
                                match = insight.match(/^\p{Extended_Pictographic}[\uFE0F]?\s*\*\*(.+?)\*\*:?/u);
                                if (match) {
                                    title = match[1].trim();
                                    content = insight.replace(match[0], '').trim();
                                } else {
                                    // 5) 줄바꿈 기준: 첫 줄이 짧으면 제목으로 간주 (보조 규칙)
                                    const lines = cleanInsight.split(/\n+/).map(l => l.trim()).filter(l => l);
                                    if (!title && lines.length > 1 && lines[0].length > 0 && lines[0].length < 40) {
                                        title = lines[0];
                                        content = lines.slice(1).join('\n').trim();
                                    }
                                    // 6) 문장 중간/다음 줄에 등장하는 **제목** 패턴 (보조 규칙)
                                    if (!title) {
                                        const midMatch = cleanInsight.match(/\n?\s*\*\*(.+?)\*\*/);
                                        if (midMatch) {
                                            title = midMatch[1].trim();
                                            content = cleanInsight.replace(midMatch[0], '').trim();
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // =========================
                    // 본문 처리 (볼드 → <b>, 문단 분리)
                    // =========================
                    if (content) {
                        // **bold** → <b>bold</b>
                        content = content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');

                        // 문단 나누기: 줄바꿈 우선, 없으면 문장 단위로
                        let paragraphs = [];

                        if (content.includes('\n')) {
                            paragraphs = content.split('\n').map(p => p.trim()).filter(p => p);
                        } else {
                            const temp = content;
                            let currentParagraph = '';
                            let charCount = 0;
                            let sentenceCount = 0;

                            for (let i = 0; i < temp.length; i++) {
                                const char = temp[i];
                                currentParagraph += char;
                                charCount++;

                                // 문장부호(. ! ?) 뒤 공백 → 새 문장 후보
                                if (/[.!?]/.test(char) && i < temp.length - 1 && /\s/.test(temp[i + 1])) {
                                    // 다음 문자가 한글/대문자/따옴표 등 → 새 문장 시작
                                    let nextCharIndex = i + 1;
                                    while (nextCharIndex < temp.length && /\s/.test(temp[nextCharIndex])) {
                                        currentParagraph += temp[nextCharIndex];
                                        nextCharIndex++;
                                        i++;
                                    }

                                    if (nextCharIndex < temp.length && /[가-힣A-Z"']/.test(temp[nextCharIndex])) {
                                        sentenceCount++;
                                        // 80자+에 2문장 이상이거나 150자 이상이면 문단 분리
                                        if ((charCount >= 80 && sentenceCount >= 2) || charCount >= 150) {
                                            paragraphs.push(currentParagraph.trim());
                                            currentParagraph = '';
                                            charCount = 0;
                                            sentenceCount = 0;
                                        }
                                    }
                                }
                            }

                            if (currentParagraph.trim()) {
                                paragraphs.push(currentParagraph.trim());
                            }

                            // 문단이 하나도 없으면 원본 유지
                            if (paragraphs.length === 0) {
                                paragraphs = [content];
                            }
                        }

                        // 여러 개의 p 태그로 렌더링
                        content = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }

                    return `
                        <article class="ai-card ${categoryType}">
                            ${title ? `<h2 class="ai-title">${title}</h2>` : ``}
                            <div class="ai-content">${content}</div>
                        </article>
                    `;
                }).join('');
            }

            // 핵심 요약도 문단으로 나누기
            if (row.key_summary) {
                let summaryContent = row.key_summary.trim();
                let summaryParagraphs = [];

                if (summaryContent.includes('\n')) {
                    summaryParagraphs = summaryContent.split('\n').map(p => p.trim()).filter(p => p);
                } else {
                    const temp = summaryContent;
                    let currentParagraph = '';
                    let charCount = 0;
                    let sentenceCount = 0;

                    for (let i = 0; i < temp.length; i++) {
                        const char = temp[i];
                        currentParagraph += char;
                        charCount++;

                        if (/[.!?]/.test(char) && i < temp.length - 1 && /\s/.test(temp[i + 1])) {
                            let nextCharIndex = i + 1;
                            while (nextCharIndex < temp.length && /\s/.test(temp[nextCharIndex])) {
                                currentParagraph += temp[nextCharIndex];
                                nextCharIndex++;
                                i++;
                            }

                            if (nextCharIndex < temp.length && /[가-힣A-Z"']/.test(temp[nextCharIndex])) {
                                sentenceCount++;
                                if ((charCount >= 80 && sentenceCount >= 2) || charCount >= 150) {
                                    summaryParagraphs.push(currentParagraph.trim());
                                    currentParagraph = '';
                                    charCount = 0;
                                    sentenceCount = 0;
                                }
                            }
                        }
                    }

                    if (currentParagraph.trim()) {
                        summaryParagraphs.push(currentParagraph.trim());
                    }
                    if (summaryParagraphs.length === 0) {
                        summaryParagraphs = [summaryContent];
                    }
                }

                // innerHTML로 여러 p 태그 렌더링
                summaryEl.innerHTML = summaryParagraphs.map(p => `<p style="margin: .6rem 0; line-height: 1.7;">${p.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')}</p>`).join('');

                // 첫/마지막 p 태그 margin 조정
                const summaryPs = summaryEl.querySelectorAll('p');
                if (summaryPs.length > 0) {
                    summaryPs[0].style.marginTop = '0';
                    summaryPs[summaryPs.length - 1].style.marginBottom = '0';
                }
            } else {
                summaryEl.textContent = "";
            }

            const categories = [
                { key: "domestic_insights", type: "domestic", icon: "🏠", label: "국내동향" },
                { key: "global_insights", type: "global", icon: "✈️", label: "해외동향" },
                { key: "government_insights", type: "government", icon: "🏛️", label: "정부동향" },
                { key: "corporate_insights", type: "corporate", icon: "🏢", label: "기업동향" },
            ];

            let html = '';
            if (category === "all") {
                // 다이제스트 레이아웃 (카드 제거, 리스트 기반)
                categories.forEach(({ key, type, icon, label }) => {
                    const insights = row[key];
                    if (!insights || insights.length === 0) return;
                    const items = insights.map(insight => {
                        let title = null;
                        let content = insight.trim().replace(/^(?:\p{Extended_Pictographic}[\uFE0F]?\s*)+/u, '');
                        const match = content.match(/^\*\*(.+?)\*\*:?\s*/);
                        if (match) { title = match[1].trim(); content = content.replace(match[0], '').trim(); }
                        if (!title) {
                            const lines = content.split(/\n+/).map(l=>l.trim()).filter(Boolean);
                            if (lines.length > 1 && lines[0].length < 40) { title = lines.shift(); content = lines.join('\n').trim(); }
                        }
                        const body = content ? content.replace(/\*\*(.+?)\*\*/g, '<b>$1<\/b>').split(/\n+/).map(p=>`<p>${p}<\/p>`).join('') : '';
                        return `
                            <div class="digest-item ${type}">
                                ${title ? `<h4 class=\"digest-title\">${title}<\/h4>` : ''}
                                <div class="digest-body">${body}<\/div>
                            <\/div>
                        `;
                    }).join('');

                    html += `
                        <section class="digest-section digest-panel" data-cat="${type}">
                            <div class="digest-header">
                                <h3 class="digest-title-cat">${label}<\/h3>
                                <button class="digest-more" data-cat="${type}" aria-label="${label} 더보기">＋<\/button>
                            <\/div>
                            <div class="digest-list">${items}<\/div>
                        <\/section>
                    `;
                });
            } else {
                categories.forEach(({ key, type, icon, label }) => {
                    if (category === type) {
                        const cards = renderCards(row[key], type);
                        if (cards) {
                            html += `
                                <section class="category-block ai-block">
                                    <div class="ai-block-header">
                                        <span class="ai-icon">${icon}</span>
                                        <h3 class="ai-block-title">${label}</h3>
                                    </div>
                                    <div class="ai-grid">${cards}</div>
                                </section>
                            `;
                        }
                    }
                });
            }

            cardSectionEl.style.opacity = 0;
            cardSectionEl.innerHTML = html;
            requestAnimationFrame(() => {
                cardSectionEl.style.transition = "opacity .4s ease";
                cardSectionEl.style.opacity = 1;
            });

            // 하단 네비게이션 업데이트
            updateBottomNav(category);

            // 스타일 주입(1회)
            const styleIdCards = 'ai-newsletter-style';
            if (!document.getElementById(styleIdCards)) {
                const style = document.createElement('style');
                style.id = styleIdCards;
                style.textContent = `
                    .ai-block { margin-bottom: 2rem; }
                    .ai-block-header { display:flex; align-items:center; gap:10px; padding: 10px 12px; border:1px solid var(--border); border-radius: 6px; background: var(--card-light); }
                    body.dark .ai-block-header { background: var(--card-dark); }
                    .ai-icon { font-size: 18px; }
                    .ai-block-title { margin:0; font-size: 1rem; }
                    .ai-grid { display:grid; gap: 14px; grid-template-columns: 1fr; }
                    @media (min-width:640px) { .ai-grid { grid-template-columns: repeat(2, 1fr); } }
                    @media (min-width:1024px) { .ai-grid { grid-template-columns: repeat(3, 1fr); } }
                    .ai-card { position: relative; border:1px solid var(--border); border-radius: 6px; padding: 14px; background: var(--card-light); box-shadow: 0 2px 8px rgba(0,0,0,.03); transition: box-shadow .15s, transform .1s, border-color .15s; }
                    body.dark .ai-card { background: var(--card-dark); }
                    /* 카테고리별 파스텔 배경 */
 
                    body.dark .ai-card.domestic { background: rgba(245,158,11,.12); }
                    body.dark .ai-card.global { background: rgba(59,130,246,.12); }
                    body.dark .ai-card.government { background: rgba(16,185,129,.12); }
                    body.dark .ai-card.corporate { background: rgba(236,72,153,.12); }
                    .ai-title { margin: .2rem 0 .4rem; font-size: 1rem; }
                    .ai-content p { margin: .45rem 0; color: #4b5563; font-size: .95rem; }
                    body.dark .ai-content p { color: #d1d5db; }
                `;
                document.head.appendChild(style);
            }

            // 다이제스트 전용 스타일 (전체 카테고리)
            const digestStyleId = 'ai-digest-style';
            if (!document.getElementById(digestStyleId)) {
                const style = document.createElement('style');
                style.id = digestStyleId;
                style.textContent = `
                    .digest-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
                    @media (min-width: 960px) { .digest-grid { grid-template-columns: 1fr 1fr; } }
                    .digest-section { margin: 1rem 0; }
                    .digest-panel { border: 1px solid var(--border); border-radius: 6px; background: var(--card-light); overflow: hidden; }
                    body.dark .digest-panel { background: var(--card-dark); }
                    .digest-header { display:flex; align-items:center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border); }
                    /* 카테고리별 파스텔 헤더 */
                    .digest-panel[data-cat="domestic"] .digest-header { background: #fff7ed; }
                    .digest-panel[data-cat="global"] .digest-header { background: #eff6ff; }
                    .digest-panel[data-cat="government"] .digest-header { background: #f0fdf4; }
                    .digest-panel[data-cat="corporate"] .digest-header { background: #fdf2f8; }
                    body.dark .digest-panel[data-cat="domestic"] .digest-header { background: rgba(245,158,11,.16); }
                    body.dark .digest-panel[data-cat="global"] .digest-header { background: rgba(59,130,246,.16); }
                    body.dark .digest-panel[data-cat="government"] .digest-header { background: rgba(16,185,129,.16); }
                    body.dark .digest-panel[data-cat="corporate"] .digest-header { background: rgba(236,72,153,.16); }
                    .digest-title-cat { margin:0; font-size: 1.05rem; font-weight: 800; letter-spacing: .01em; }
                    .digest-more { border: 1px solid var(--border); background: transparent; color: inherit; border-radius: 4px; padding: 2px 10px; cursor: pointer; font-weight: 700; }
                    .digest-more:hover { background: var(--bg-light); }
                    .digest-list { display:block; padding: 6px 12px; }
                    .digest-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
                    .digest-item:last-child { border-bottom: none; }

            // 전체 페이지일 때 2열 패널 배치

        const switchCategory = (category) => {
            // 상단 네비게이션 버튼 업데이트
            navBtns.forEach(b => b.classList.remove("selected"));
            const targetBtn = Array.from(navBtns).find(b => b.dataset.cat === category);
            if (targetBtn) targetBtn.classList.add("selected");

            currentCategory = category;

            // URL 해시 업데이트
            if (currentCategory === 'all') {
                window.location.hash = '';
            } else {
                window.location.hash = currentCategory;
            }

            // 전용 카테고리 렌더링
            if (category === 'legal') {
                renderLegalReports();
            } else if (category === 'interview') {
                renderInterviewTimeline();
            } else if (category === 'agi') {
                renderAgiTimeline();
            } else if (fetchedData) {
                handleRenderInsights(fetchedData, currentCategory);
            }

            // 상단으로 부드럽게 스크롤

            // 고정 인디케이터는 사용하지 않음
        };

        navBtns.forEach(btn => {

                switchCategory(btn.dataset.cat);

        // 하단 네비게이션 버튼 이벤트
        bottomNavBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                switchCategory(btn.dataset.cat);
            });
        });

        document.getElementById("refreshBtn").addEventListener("click", fetchAndStoreData);

        // 날짜 네비게이션 기능
        const prevDayBtn = document.getElementById("prevDayBtn");
        const nextDayBtn = document.getElementById("nextDayBtn");
        const currentDateDisplay = document.getElementById("currentDateDisplay");

        const formatDisplayDate = (dateStr) => {
            if (!dateStr) return "오늘";
            const d = new Date(dateStr);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            return `${yyyy}년 ${mm}월 ${dd}일`;
        };

        const getCurrentDate = () => {
            const dateParam = getDateFromUrl();
            if (dateParam) return dateParam;

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, "0");
            const dd = String(today.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        };

        const navigateToDate = (dateStr) => {
            const url = new URL(window.location);
            url.searchParams.set('date', dateStr);
            window.history.pushState({}, '', url);
            fetchAndStoreData();
            updateDateDisplay();
        };

        const updateDateDisplay = () => {
            const currentDate = getCurrentDate();
            currentDateDisplay.textContent = formatDisplayDate(currentDate);

            // 미래 날짜는 "다음날" 버튼 비활성화
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const current = new Date(currentDate);
            current.setHours(0, 0, 0, 0);

            nextDayBtn.disabled = (current >= today);
        };

        prevDayBtn.addEventListener("click", () => {
            const currentDate = getCurrentDate();
            const date = new Date(currentDate);
            date.setDate(date.getDate() - 1);

            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, "0");
            const dd = String(date.getDate()).padStart(2, "0");
            const newDate = `${yyyy}-${mm}-${dd}`;

            navigateToDate(newDate);
        });

        nextDayBtn.addEventListener("click", () => {
            const currentDate = getCurrentDate();
            const date = new Date(currentDate);
            date.setDate(date.getDate() + 1);

            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, "0");
            const dd = String(date.getDate()).padStart(2, "0");
            const newDate = `${yyyy}-${mm}-${dd}`;

            navigateToDate(newDate);
        });

        // 이미지 지연 로딩: data-img 또는 동적 OG 이미지
        function setupLazyLoadingForImages(rootEl = document) {
            const observer = ('IntersectionObserver' in window) ? new IntersectionObserver(async (entries, obs) => {
                for (const entry of entries) {
                    if (!entry.isIntersecting) continue;
                    const img = entry.target;
                    obs.unobserve(img);
                    try {
                        const direct = img.getAttribute('data-img');
                        const url = img.getAttribute('data-url');
                        let targetSrc = direct || '';

                        // category-specific fallback if provided
                        const catKey = (img.getAttribute('data-cat') || '').toString().toLowerCase();
                        const catFallback = (typeof AGI_CATEGORY_THUMBS !== 'undefined' && AGI_CATEGORY_THUMBS[catKey]) ? AGI_CATEGORY_THUMBS[catKey] : DEFAULT_THUMB;

                        if (!targetSrc && url) {
                            targetSrc = await fetchOgImage(url) ;
                        }
                        img.onerror = () => { img.onerror = null; img.src = catFallback || DEFAULT_THUMB; };
                        img.src = targetSrc || catFallback || DEFAULT_THUMB;
                    } catch (e) {
                        const key = (entry.target.getAttribute('data-cat') || '').toString().toLowerCase();
                        const fallback = (typeof AGI_CATEGORY_THUMBS !== 'undefined' && AGI_CATEGORY_THUMBS[key]) ? AGI_CATEGORY_THUMBS[key] : DEFAULT_THUMB;
                        entry.target.src = fallback || DEFAULT_THUMB;
                    }
                }
            }, { rootMargin: '200px 0px', threshold: 0.01 }) : null;

            const imgs = rootEl.querySelectorAll('img[data-img], img.og-thumb[data-url]');
            imgs.forEach(img => {
                // 플레이스홀더는 이미 DEFAULT_THUMB로 설정됨(혹은 빈 경우 여기서 설정)
                if (!img.getAttribute('src')) img.setAttribute('src', DEFAULT_THUMB);
                if (observer) {
                    observer.observe(img);
                } else {
                    // 폴백: 즉시 로딩
                    (async () => {
                        const direct = img.getAttribute('data-img');
                        const url = img.getAttribute('data-url');
                        const catKey = (img.getAttribute('data-cat') || '').toString().toLowerCase();
                        const catFallback = (typeof AGI_CATEGORY_THUMBS !== 'undefined' && AGI_CATEGORY_THUMBS[catKey]) ? AGI_CATEGORY_THUMBS[catKey] : DEFAULT_THUMB;
                        let src = direct || '';
                        if (!src && url) src = await fetchOgImage(url) ;
                        img.onerror = () => { img.onerror = null; img.src = catFallback || DEFAULT_THUMB; };
                        img.src = src || catFallback || DEFAULT_THUMB;
                    })();
                }
            });
        }

        // 고정 인디케이터 관련 코드는 제거됨

        // 초기 날짜 표시 업데이트
        updateDateDisplay();

        // AGI 타임라인 렌더링
        let currentAgiView = 'table'; // timeline, grid, table, stats
        let currentAgiFilter = 'all';
        let agiItems = [];

        async function renderAgiTimeline() {
            try {
                const summarySection = document.querySelector(".summary-section");
                summarySection.style.display = "none";
                bottomCategoryNav.style.display = "none";

                // 로컬/인라인 소스는 사용하지 않고, 지정된 GitHub raw URL만 사용합니다.
                const remoteUrl = 'agi_timeline.json';
                try {
                    console.log('Loading AGI timeline from remote only:', remoteUrl);
                    const res = await fetch(remoteUrl, { cache: 'no-store' });
                    if (!res.ok) {
                        console.error('Remote fetch failed:', res.status, res.statusText);
                        throw new Error(`HTTP ${res.status} ${res.statusText}`);
                    }
                    const text = await res.text();
                    try {
                        agiItems = JSON.parse(text);
                        console.log('Loaded AGI timeline items from remote, count=', (agiItems && agiItems.length) || 0);
                    } catch (parseErr) {
                        console.error('Failed to parse JSON from remote AGI timeline:', parseErr);
                        throw parseErr;
                    }
                } catch (err) {
                    console.error('Error loading remote agi_timeline.json:', err);
                    cardSectionEl.innerHTML = `<div class="error">AGI 타임라인을 불러오지 못했습니다. 콘솔을 확인하세요.</div>`;
                    return;
                }

                renderAgiView();
            } catch (e) {
                cardSectionEl.innerHTML = `<div class="error">AGI 타임라인을 불러오지 못했습니다: ${String(e)}</div>`;
            }
        }

        function renderAgiView() {
            const sorted = agiItems
                .filter(it => it && it.date)
                .sort((a, b) => (a.date < b.date ? 1 : -1));
            
            const getCat = (it) => (it.category || it['category '] || '').toString().trim();
            const getHost = (url) => { try { return new URL(url).hostname.replace(/^www\./,''); } catch { return ''; } };
            
            // 카테고리 목록
            const cats = Array.from(new Set(sorted.map(it => getCat(it)).filter(Boolean)));
            
            // 필터링된 아이템
            const filtered = currentAgiFilter === 'all' ? sorted : sorted.filter(it => getCat(it) === currentAgiFilter);
            
            // 연도별 그룹
            const byYear = filtered.reduce((acc, it) => {
                const y = String(it.date).slice(0, 4);
                (acc[y] = acc[y] || []).push(it);
                return acc;
            }, {});

            // 뷰 전환 버튼 및 필터 바
            const controlsHtml = `
                <section class="category-block">
                    <h3 class="category-title">🧠 AGI 타임라인</h3>
                    <div class="agi-controls">
                        <div class="agi-view-switcher">
                            <button class="agi-view-btn ${currentAgiView === 'timeline' ? 'active' : ''}" data-view="timeline" title="타임라인">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                                타임라인
                            </button>
                            <button class="agi-view-btn ${currentAgiView === 'grid' ? 'active' : ''}" data-view="grid" title="그리드">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                                그리드
                            </button>
                            <button class="agi-view-btn ${currentAgiView === 'table' ? 'active' : ''}" data-view="table" title="테이블">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                                테이블
                            </button>
                            <button class="agi-view-btn ${currentAgiView === 'stats' ? 'active' : ''}" data-view="stats" title="통계">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="14" width="4" height="6"/><rect x="10" y="10" width="4" height="10"/><rect x="16" y="6" width="4" height="14"/></svg>
                                통계
                            </button>
                        </div>
                        <div class="agi-filter-bar">
                            <button class="agi-filter-btn ${currentAgiFilter === 'all' ? 'selected' : ''}" data-cat="all">전체 (${sorted.length})</button>
                            ${cats.map(c => `<button class="agi-filter-btn ${currentAgiFilter === c ? 'selected' : ''}" data-cat="${c}">${c} (${sorted.filter(it => getCat(it) === c).length})</button>`).join('')}
                        </div>
                    </div>
                </section>
            `;

            let contentHtml = '';
            
            if (currentAgiView === 'timeline') {
                contentHtml = renderTimelineView(byYear, getCat, getHost);
            } else if (currentAgiView === 'grid') {
                contentHtml = renderGridView(filtered, getCat, getHost);
            } else if (currentAgiView === 'table') {
                contentHtml = renderTableView(filtered, getCat, getHost);
            } else if (currentAgiView === 'stats') {
                contentHtml = renderStatsView(sorted, getCat);
            }

            const sourceHtml = `
                <div class="agi-footer">
                    <section class="agi-previous-card" aria-label="이전 인공지능 역사">
                        <div class="prev-left">
                            <div class="prev-title">이전 인공지능 역사도 살펴보기</div>
                            <div class="prev-desc">AI 역사 전체를 정리한 글에서 더 많은 사건과 배경을 확인하세요.</div>
                        </div>
                        <a class="prev-btn" href="https://blog.koraia.org/posts/ai-timeline/" target="_blank" rel="noopener noreferrer">보러 가기</a>
                    </section>
                </div>
            `;

            cardSectionEl.style.opacity = 0;
            cardSectionEl.innerHTML = controlsHtml + contentHtml + sourceHtml;

            // 이벤트 바인딩
            cardSectionEl.querySelectorAll('.agi-view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentAgiView = btn.dataset.view;
                    renderAgiView();
                });
            });

            cardSectionEl.querySelectorAll('.agi-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentAgiFilter = btn.dataset.cat;
                    renderAgiView();
                });
            });

            // 스타일 삽입
            insertAgiStyles();

            requestAnimationFrame(() => {
                cardSectionEl.style.transition = "opacity .3s ease";
                cardSectionEl.style.opacity = 1;
            });

            setupLazyLoadingForImages(cardSectionEl);
        }

        function renderTimelineView(byYear, getCat, getHost) {
            return `
                <div class="timeline-center">
                    <div class="timeline-line"></div>
                    ${Object.keys(byYear).sort((a,b)=>b.localeCompare(a)).map(year => `
                        <div class="timeline-year" data-year="${year}">
                            <div class="year-badge">${year}</div>
                        </div>
                        ${(() => { let lastMonth = null; return byYear[year].map((it, idx) => { 
                            const m = (new Date(it.date)).getMonth() + 1; 
                            const showMonth = m !== lastMonth; lastMonth = m; 
                            const host = getHost(it.link);
                            const cat = getCat(it);
                            return `
                                <a class="timeline-entry ${idx % 2 === 0 ? 'left' : 'right'}" href="${it.link}" target="_blank" rel="noopener noreferrer" data-cat="${cat || ''}">
                                    <div class="entry-card">
                                        <div class="entry-thumb">
                                            <img class="og-thumb" src="${DEFAULT_THUMB}" data-url="${it.link}" data-cat="${(cat || '').toLowerCase()}" alt="${year} 항목" />
                                        </div>

                                            <div class="entry-meta">
                                                ${cat ? `<span class="entry-badge">${cat}</span>` : ''}
                                                <span class="entry-date">${it.date}</span>
                                                ${host ? `<span class="entry-source"><img class="fav" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=16" alt=""/>${host}</span>` : ''}
                                            </div>
                                            <h4 class="entry-title">${it.title || ''}</h4>
                                            ${it.description ? `<p class="entry-desc">${it.description}</p>` : ''}
                                            ${it.additional_description ? `<p class="entry-additional">${it.additional_description}</p>` : ''}

                                    </div>
                                    <span class="dot"></span>

                    `).join('')}
                </div>
            `;
        }

        function renderGridView(items, getCat, getHost) {
            return `
                <div class="agi-grid">
                    ${items.map(it => {
                        const cat = getCat(it);
                        const host = getHost(it.link);

                            <a class="agi-grid-card" href="${it.link}" target="_blank" rel="noopener noreferrer">
